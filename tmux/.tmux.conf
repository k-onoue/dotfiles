# tmux configuration managed by dotfiles.

# Enable mouse support for pane selection, resizing, and scrolling.
set -g mouse on

# Use a 256-color terminal definition by default.
set -g default-terminal "screen-256color"

# Advertise truecolor support to capable terminals.
set -ga terminal-overrides ",xterm-256color:Tc"

# Allow terminal clipboard integration such as Vim OSC52 copy over SSH.
set -g set-clipboard on

# Keep the default prefix (Ctrl-b) for portability.
set -g history-limit 10000
